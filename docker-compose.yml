services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=sepsis_cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870/"]
      interval: 10s
      timeout: 5s
      retries: 5

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
    depends_on:
      namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9864/"]
      interval: 10s
      timeout: 5s
      retries: 5

  hdfs-init:
    image: bde2020/hadoop-base:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-init
    depends_on:
      datanode:
        condition: service_healthy
    volumes:
      - ./data:/local_data
      - ./init-hdfs.sh:/init-hdfs.sh
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    command: bash /init-hdfs.sh

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 6

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        kafka-topics --create --bootstrap-server kafka:9092 --topic ${KAFKA_TOPIC:-icu_data} --partitions 3 --replication-factor 1 2>/dev/null || true;
      "

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
      - ./cassandra/init.cql:/docker-entrypoint-initdb.d/init.cql
    environment:
      - CASSANDRA_CLUSTER_NAME=ICUMonitoring
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 10s
      timeout: 5s
      retries: 10

  cassandra-init:
    image: cassandra:4.1
    container_name: cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./cassandra/init.cql:/init.cql
    command: >
      bash -c "
        echo 'Waiting for Cassandra to be ready...' &&
        cqlsh cassandra -e 'DESCRIBE KEYSPACES;' &&
        echo 'Creating keyspace and table...' &&
        cqlsh cassandra -f /init.cql &&
        echo 'Done.' &&
        exit 0
      "

  nifi:
    image: apache/nifi:latest
    container_name: nifi
    hostname: nifi
    ports:
      - "8443:8443"
    volumes:
      - ./data:/data
    environment:
      - NIFI_WEB_PROXY_HOST=localhost:8443,127.0.0.1:8443,nifi:8443
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=adminpassword123
    healthcheck:
      test: ["CMD-SHELL", "/opt/nifi/nifi-current/bin/nifi.sh status 2>&1 | grep -q 'HTTP 200' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s

  nifi-setup:
    build: ./nifi
    container_name: nifi-setup
    depends_on:
      nifi:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=${KAFKA_TOPIC:-icu_data}
      - NIFI_DATA_DIRS=${ACTIVE_DATA_DIR:-/data/active}
      - DELAY=${DELAY:-2}
    command: >
      --nifi-url https://nifi:8443/nifi-api
      --username admin
      --password adminpassword123
      --no-wait

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: mlflow
    ports:
      - "5001:5001"
    command: >
      sh -c "chmod 777 /mlflow/artifacts &&
      mlflow server
      --host 0.0.0.0
      --port 5001
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
      --serve-artifacts"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    build:
      context: ./mlops
      dockerfile: Dockerfile.airflow
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=sepsis_airflow_secret_key_123
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin
      "

  airflow-webserver:
    build:
      context: ./mlops
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=sepsis_airflow_secret_key_123
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./mlops:/opt/airflow/mlops
      - ./data:/data
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  airflow-scheduler:
    build:
      context: ./mlops
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    depends_on:
      airflow-webserver:
        condition: service_healthy
      hdfs-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=sepsis_airflow_secret_key_123
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./mlops:/opt/airflow/mlops
      - ./data:/data
      - mlflow-artifacts:/mlflow/artifacts
    command: scheduler
    deploy:
      resources:
        limits:
          cpus: '16.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G

  spark-master:
    build: ./spark
    container_name: spark-master
    ports:
      - "7077:7077"
      - "4040:4040"
    environment:
      - SPARK_MODE=master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 4040
    volumes:
      - spark-checkpoints:/tmp/checkpoint
    depends_on:
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy

  spark-worker:
    build: ./spark
    deploy:
      replicas: ${SPARK_WORKER_REPLICAS:-1}
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-1}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-1g}
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - spark-checkpoints:/tmp/checkpoint
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      - spark-master

  spark-app:
    build: ./spark
    container_name: spark-app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=${KAFKA_TOPIC:-icu_data}
      - MAX_OFFSETS_PER_TRIGGER=${MAX_OFFSETS_PER_TRIGGER:-4}
      - SPARK_CHECKPOINT_LOCATION=${SPARK_CHECKPOINT_LOCATION:-/tmp/checkpoint/active}
      - MODEL_SOURCE=${MODEL_SOURCE:-local}
      - LOCAL_MODEL_DIR=${LOCAL_MODEL_DIR:-/app/models/kaggle_export}
    volumes:
      - spark-checkpoints:/tmp/checkpoint
      - ./spark/ivy2:/root/.ivy2
      - ./spark/app:/app
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      spark-master:
        condition: service_started
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      kafka-init:  
        condition: service_completed_successfully
      airflow-webserver:
        condition: service_healthy
      hdfs-init:
        condition: service_completed_successfully
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --conf
      - spark.driver.extraJavaOptions=-XX:-UseContainerSupport
      - --conf
      - spark.executor.extraJavaOptions=-XX:-UseContainerSupport
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.spark:spark-token-provider-kafka-0-10_2.12:3.5.0,org.apache.kafka:kafka-clients:3.4.1,com.datastax.spark:spark-cassandra-connector_2.12:3.5.0
      - --conf
      - spark.cassandra.connection.host=cassandra
      - --conf
      - spark.sql.streaming.checkpointLocation=hdfs://namenode:9000/spark/checkpoints
      - /app/spark_stream.py

  api:
    build: ./api
    deploy:
      replicas: 2
    environment:
      - CASSANDRA_HOST=cassandra
      - DATA_DIR=${ACTIVE_DATA_DIR:-/data/active}
      - DEMO_PATIENT_IDS=${DEMO_PATIENT_IDS:-}
      - USE_X_PATIENTS=${USE_X_PATIENTS:-false}
      - X_PATIENTS=${X_PATIENTS:-100}
      - MAX_PATIENTS=${MAX_PATIENTS:-10}
      - SEPSIS_THRESHOLD=${SEPSIS_THRESHOLD:-0.53}
    volumes:
      - ./data:/data:ro
    depends_on:
      cassandra-init:  
        condition: service_completed_successfully

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  spark-checkpoints:
  mlflow-artifacts:
  cassandra-data:
