services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 6

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        kafka-topics --create --bootstrap-server kafka:9092 --topic ${KAFKA_TOPIC:-icu_data} --partitions 3 --replication-factor 1 2>/dev/null || true;
      "

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
      - ./cassandra/init.cql:/docker-entrypoint-initdb.d/init.cql
    environment:
      - CASSANDRA_CLUSTER_NAME=ICUMonitoring
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 10s
      timeout: 5s
      retries: 10

  cassandra-init:
    image: cassandra:4.1
    container_name: cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./cassandra/init.cql:/init.cql
    command: >
      bash -c "
        echo 'Waiting for Cassandra to be ready...' &&
        cqlsh cassandra -e 'DESCRIBE KEYSPACES;' &&
        echo 'Creating keyspace and table...' &&
        cqlsh cassandra -f /init.cql &&
        echo 'Done.' &&
        exit 0
      "

  data-prep:
    image: python:3.10-slim
    container_name: data-prep
    working_dir: /workspace
    environment:
      - USE_X_PATIENTS=${USE_X_PATIENTS:-false}
      - X_PATIENTS=${X_PATIENTS:-100}
      - MAX_PATIENTS=${MAX_PATIENTS:-100}
      - DELAY=${DELAY:-2}
      - ACTIVE_DATA_DIR=${ACTIVE_DATA_DIR:-/data/active}
      - SAMPLE_DATA_DIR=/data/sample
      - DEMO_PATIENT_IDS=${DEMO_PATIENT_IDS:-}
    volumes:
      - ./data:/data
      - ./scripts:/scripts:ro
    command: python /scripts/prepare_demo_data.py

  nifi:
    image: apache/nifi:latest
    container_name: nifi
    hostname: nifi
    ports:
      - "8443:8443"
    volumes:
      - ./data:/data
    environment:
      - NIFI_WEB_PROXY_HOST=localhost:8443,127.0.0.1:8443,nifi:8443
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=adminpassword123
    healthcheck:
      test: ["CMD-SHELL", "/opt/nifi/nifi-current/bin/nifi.sh status 2>&1 | grep -q 'HTTP 200' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s

  nifi-setup:
    build: ./nifi
    container_name: nifi-setup
    depends_on:
      data-prep:
        condition: service_completed_successfully
      nifi:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=${KAFKA_TOPIC:-icu_data}
      - NIFI_DATA_DIRS=${ACTIVE_DATA_DIR:-/data/active}
      - DELAY=${DELAY:-2}
    command: >
      --nifi-url https://nifi:8443/nifi-api
      --username admin
      --password adminpassword123
      --no-wait

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: mlflow
    ports:
      - "5001:5001"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5001
      --backend-store-uri sqlite:///mlflow.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/')"]
      interval: 10s
      timeout: 5s
      retries: 5

  training:
    build: ./mlops
    container_name: training
    volumes:
      - ./data:/data
    depends_on:
      mlflow:
        condition: service_healthy
    command: >
      --data-dirs /data/Data-Set-A,/data/Data-Set-B --mlflow-uri http://mlflow:5001 --max-files 200

  spark-master:
    build: ./spark
    container_name: spark-master
    ports:
      - "7077:7077"
      - "4040:4040"
    environment:
      - SPARK_MODE=master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 4040
    volumes:
      - spark-checkpoints:/tmp/checkpoint
    depends_on:
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy

  spark-worker:
    build: ./spark
    deploy:
      replicas: ${SPARK_WORKER_REPLICAS:-1}
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-1}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-1g}
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - spark-checkpoints:/tmp/checkpoint
    depends_on:
      - spark-master

  spark-app:
    build: ./spark
    container_name: spark-app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=${KAFKA_TOPIC:-icu_data}
      - MAX_OFFSETS_PER_TRIGGER=${MAX_OFFSETS_PER_TRIGGER:-4}
      - SPARK_CHECKPOINT_LOCATION=${SPARK_CHECKPOINT_LOCATION:-/tmp/checkpoint/active}
    volumes:
      - spark-checkpoints:/tmp/checkpoint
      - ./spark/ivy2:/home/spark/.ivy2
      - ./spark/app:/app
    depends_on:
      spark-master:
        condition: service_started
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      kafka-init:  
        condition: service_completed_successfully
      training:
        condition: service_completed_successfully
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --conf
      - spark.driver.extraJavaOptions=-XX:-UseContainerSupport
      - --conf
      - spark.executor.extraJavaOptions=-XX:-UseContainerSupport
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.4,com.datastax.spark:spark-cassandra-connector_2.12:3.5.0
      - --conf
      - spark.cassandra.connection.host=cassandra
      - --conf
      - spark.sql.streaming.checkpointLocation=${SPARK_CHECKPOINT_LOCATION:-/tmp/checkpoint/active}
      - /app/spark_stream.py

  api:
    build: ./api
    deploy:
      replicas: 2
    environment:
      - CASSANDRA_HOST=cassandra
      - DATA_DIR=${ACTIVE_DATA_DIR:-/data/active}
      - DEMO_PATIENT_IDS=${DEMO_PATIENT_IDS:-}
      - USE_X_PATIENTS=${USE_X_PATIENTS:-false}
      - X_PATIENTS=${X_PATIENTS:-100}
      - MAX_PATIENTS=${MAX_PATIENTS:-10}
    volumes:
      - ./data:/data:ro
    depends_on:
      data-prep:
        condition: service_completed_successfully
      cassandra-init:  
        condition: service_completed_successfully

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  spark-checkpoints:
  cassandra-data:
